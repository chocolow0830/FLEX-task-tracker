<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLEX Task Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F5FF;min-height:100vh;padding:20px}
    input,select,textarea{font-family:inherit}
    @keyframes pompom-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes pompom-wave{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-30deg) translateY(-4px)}60%{transform:rotate(20deg) translateY(-2px)}}
    @keyframes pompom-tap{0%,100%{transform:rotate(0deg)}40%{transform:rotate(40deg) translateY(6px)}70%{transform:rotate(20deg) translateY(3px)}}
    @keyframes clover-sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(8deg)}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite}
    .pompom-float{animation:pompom-float 3s ease-in-out infinite}
    .pompom-wave{animation:pompom-wave 0.6s ease-in-out 3}
    .pompom-tap{animation:pompom-tap 0.5s ease-in-out 3}
    .clover{animation:clover-sway 2.5s ease-in-out infinite;transform-origin:bottom center}
    .sparkle{animation:sparkle 2s ease-in-out infinite}
    .task-card{transition:border-color .15s,box-shadow .15s}
    .task-card:hover{border-color:#C4B5FD!important;box-shadow:0 3px 12px rgba(124,58,237,0.1)}
    select option{background:#fff;color:#2D1B69}
  </style>
</head>
<body>
<div id="app" style="max-width:680px;margin:0 auto"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAoPLRTuoZnH5w41p0JzClksRrnMsg3fms",
  authDomain: "flex-task-tracker.firebaseapp.com",
  projectId: "flex-task-tracker",
  storageBucket: "flex-task-tracker.firebasestorage.app",
  messagingSenderId: "615019361037",
  appId: "1:615019361037:web:8b06a059e9aaa4f865b644"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CATEGORIES = [
  {id:"IT",label:"IT & Dev",icon:"ti-code",color:"#6D28D9",bg:"#EDE9FE",border:"#C4B5FD"},
  {id:"Finance",label:"Finance",icon:"ti-currency-dollar",color:"#9D174D",bg:"#FCE7F3",border:"#F9A8D4"},
  {id:"Legal",label:"Legal",icon:"ti-gavel",color:"#1E40AF",bg:"#DBEAFE",border:"#93C5FD"},
  {id:"Marketing",label:"Marketing",icon:"ti-speakerphone",color:"#92400E",bg:"#FEF3C7",border:"#FCD34D"},
  {id:"Operations",label:"Operations",icon:"ti-settings",color:"#065F46",bg:"#D1FAE5",border:"#6EE7B7"},
];
const PRIORITIES=["High","Medium","Low"];
const STATUSES=["To Do","In Progress","Done"];
const PRI={High:{color:"#9F1239",bg:"#FFF1F2",dot:"#FB7185"},Medium:{color:"#78350F",bg:"#FFFBEB",dot:"#FBBF24"},Low:{color:"#065F46",bg:"#ECFDF5",dot:"#34D399"}};
const STA={"To Do":{color:"#4B5563",bg:"#F3F4F6",border:"#D1D5DB"},"In Progress":{color:"#5B21B6",bg:"#EDE9FE",border:"#A78BFA"},Done:{color:"#065F46",bg:"#ECFDF5",border:"#6EE7B7"}};
const C={bg:"#F7F5FF",card:"#FFFFFF",border:"#E8E3F8",text:"#2D1B69",sub:"#7C6FAF",muted:"#A89EC9",accent:"#7C3AED",pink:"#BE185D"};

const DEFAULT_TASKS=[
  {id:1,cat:"IT",title:"Team Aaron Phase 1 deliverables review",priority:"High",status:"In Progress",notes:"Deadline Jun 19"},
  {id:2,cat:"IT",title:"Team Gi Wai Phase 2 scope alignment",priority:"Medium",status:"To Do",notes:""},
  {id:3,cat:"IT",title:"Nova AI Coach UI — 3 personality modes",priority:"Medium",status:"To Do",notes:""},
  {id:4,cat:"IT",title:"Google Stitch prompts for user-facing app",priority:"High",status:"In Progress",notes:"SJ on design"},
  {id:5,cat:"Finance",title:"Cradle Fund CIP SPRINT grant application",priority:"High",status:"In Progress",notes:"Pitch deck & market research prepared"},
  {id:6,cat:"Finance",title:"BSN loan drawdown tracking (RM40K)",priority:"Medium",status:"In Progress",notes:"4% rate, approved"},
  {id:7,cat:"Legal",title:"Trainer cancellation & reschedule policy",priority:"High",status:"In Progress",notes:"Pending Ken's review"},
  {id:8,cat:"Legal",title:"Bypass prevention framework wording",priority:"High",status:"In Progress",notes:"Open item from Ken's meeting"},
  {id:9,cat:"Legal",title:"Points system disclaimer wording",priority:"Medium",status:"To Do",notes:"Redeemable for vouchers/merchandise only"},
  {id:10,cat:"Legal",title:"Insurance & liability disclaimer",priority:"Medium",status:"To Do",notes:"Pending Ken"},
  {id:11,cat:"Marketing",title:"Launch campaign copywriting",priority:"High",status:"In Progress",notes:"KOL outreach, 90-day challenge"},
  {id:12,cat:"Marketing",title:"Mascot character intro assets",priority:"Low",status:"Done",notes:"Fufu, Guru, Pompom, Lumi ✓"},
  {id:13,cat:"Operations",title:"5 venue partnerships before Dec launch",priority:"High",status:"To Do",notes:"Target Klang Valley gyms"},
  {id:14,cat:"Operations",title:"Credit & commission structure doc",priority:"High",status:"To Do",notes:"1 credit = RM25; 40–45% commission"},
];
const DEFAULT_MILESTONES=[
  {id:1,date:"2026-06-11",label:"Phase 1A Beta Launch",done:true},
  {id:2,date:"2026-06-19",label:"Codebase delineation deadline",done:false},
  {id:3,date:"2026-12-12",label:"Grand Public Launch (Klang Valley)",done:false},
];

let state={tasks:DEFAULT_TASKS,milestones:DEFAULT_MILESTONES,activeTab:"All",filterStatus:"All",modal:null,draft:null,showMsForm:false,msForm:{label:"",date:""},showDetect:false,pasteText:"",detecting:false,detected:null,detectError:"",pompomAnim:"idle",loading:true};

// Firebase save/load
async function saveToFirebase(){
  try{
    await setDoc(doc(db,"tracker","data"),{tasks:state.tasks,milestones:state.milestones,updatedAt:new Date().toISOString()});
  }catch(e){console.error("Save error",e);}
}
async function loadFromFirebase(){
  try{
    const snap=await getDoc(doc(db,"tracker","data"));
    if(snap.exists()){
      const d=snap.data();
      state.tasks=d.tasks||DEFAULT_TASKS;
      state.milestones=d.milestones||DEFAULT_MILESTONES;
    }
  }catch(e){console.error("Load error",e);}
  state.loading=false;
  render();
}

const fmtDate=d=>new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const daysUntil=d=>{const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+"T00:00:00")-t)/86400000);};

function setState(updates){Object.assign(state,updates);render();}
function setAndSave(updates){Object.assign(state,updates);render();saveToFirebase();}

// Pompom animation cycle
let pompomTimer=null;
function schedulePompom(){
  clearTimeout(pompomTimer);
  const anims=["wave","wave","tap","blink","idle","idle"];
  const delay=3000+Math.random()*5000;
  pompomTimer=setTimeout(()=>{
    const pick=anims[Math.floor(Math.random()*anims.length)];
    setState({pompomAnim:pick});
    setTimeout(()=>{setState({pompomAnim:"idle"});schedulePompom();},1800);
  },delay);
}

function pompomHTML(){
  const a=state.pompomAnim;
  const isWave=a==="wave",isTap=a==="tap",isBlink=a==="blink";
  return `
  <div style="position:relative;width:80px;height:90px;flex-shrink:0;cursor:pointer" onclick="triggerPompom()">
    <div class="pompom-float" style="position:absolute;bottom:10px;left:0;width:80px">
      <div class="clover" style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:18px;line-height:1">🍀</div>
      ${[{t:-8,l:2,d:0},{t:2,l:68,d:0.4},{t:20,l:72,d:0.8},{t:-4,l:40,d:1.2}].map(s=>`<div class="sparkle" style="position:absolute;top:${s.t}px;left:${s.l}px;width:6px;height:6px;border-radius:50%;background:#FFF59D;animation-delay:${s.d}s"></div>`).join("")}
      <div style="position:relative;width:68px;height:62px;margin:0 auto">
        <div style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 35% 30%,#B5F08A,#6DBF3A 55%,#4A9A1F)"></div>
        <div style="position:absolute;inset:-3px;border-radius:50%;background:radial-gradient(ellipse at 40% 25%,rgba(255,255,255,0.18),transparent 60%);filter:blur(2px)"></div>
        <div style="position:absolute;top:28px;left:-10px;width:16px;height:22px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:radial-gradient(ellipse at 40% 30%,#B5F08A,#5AAF2A);transform-origin:top right" class="${isWave?"pompom-wave":isTap?"pompom-tap":""}"></div>
        <div style="position:absolute;top:30px;right:-10px;width:14px;height:20px;border-radius:50%;background:radial-gradient(ellipse at 40% 30%,#B5F08A,#5AAF2A);transform:rotate(15deg)"></div>
        <div style="position:absolute;bottom:-10px;left:14px;width:13px;height:16px;border-radius:40% 40% 50% 50%;background:#4A9A1F"></div>
        <div style="position:absolute;bottom:-10px;right:14px;width:13px;height:16px;border-radius:40% 40% 50% 50%;background:#4A9A1F"></div>
        ${[{l:14},{l:38}].map(e=>`<div style="position:absolute;top:18px;left:${e.l}px;width:16px;height:${isBlink?3:16}px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden"><div style="width:10px;height:10px;border-radius:50%;background:#2D6A0A;display:flex;align-items:center;justify-content:center"><div style="width:4px;height:4px;border-radius:50%;background:#fff;opacity:0.7"></div></div></div>`).join("")}
        <div style="position:absolute;top:38px;left:50%;transform:translateX(-50%);width:18px;height:9px;border-bottom:2.5px solid rgba(30,80,10,0.5);border-radius:0 0 10px 10px"></div>
      </div>
      <div style="width:50px;height:8px;background:rgba(0,0,0,0.08);border-radius:50%;margin:4px auto 0;filter:blur(3px)"></div>
    </div>
  </div>`;
}

window.triggerPompom=function(){
  clearTimeout(pompomTimer);
  setState({pompomAnim:"wave"});
  setTimeout(()=>{setState({pompomAnim:"idle"});schedulePompom();},1800);
};
window.cycleStatus=function(id){
  state.tasks=state.tasks.map(t=>t.id!==id?t:{...t,status:STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length]});
  setAndSave({});
};
window.openView=function(id){
  const t=state.tasks.find(x=>x.id===id);
  setState({modal:{mode:"view",task:t},draft:{...t}});
};
window.openAdd=function(){
  setState({modal:{mode:"add"},draft:{cat:state.activeTab!=="All"?state.activeTab:"IT",title:"",priority:"High",status:"To Do",notes:""}});
};
window.closeModal=function(){setState({modal:null,draft:null});};
window.setDraft=function(key,val){setState({draft:{...state.draft,[key]:val}});};
window.saveTask=function(){
  if(!state.draft.title.trim())return;
  if(state.modal.mode==="add"){
    state.tasks=[...state.tasks,{...state.draft,id:Date.now()}];
  } else {
    state.tasks=state.tasks.map(t=>t.id===state.modal.task.id?{...t,...state.draft}:t);
  }
  setAndSave({modal:null,draft:null});
};
window.deleteTask=function(id){
  state.tasks=state.tasks.filter(t=>t.id!==id);
  setAndSave({modal:null,draft:null});
};
window.setTab=function(tab){setState({activeTab:tab});};
window.setFilter=function(val){setState({filterStatus:val});};
window.toggleMs=function(id){
  state.milestones=state.milestones.map(m=>m.id===id?{...m,done:!m.done}:m);
  setAndSave({});
};
window.deleteMs=function(id){
  state.milestones=state.milestones.filter(m=>m.id!==id);
  setAndSave({});
};
window.toggleMsForm=function(){setState({showMsForm:!state.showMsForm});};
window.setMsForm=function(key,val){setState({msForm:{...state.msForm,[key]:val}});};
window.addMs=function(){
  if(!state.msForm.label.trim()||!state.msForm.date)return;
  state.milestones=[...state.milestones,{id:Date.now(),...state.msForm,done:false}].sort((a,b)=>a.date.localeCompare(b.date));
  setAndSave({showMsForm:false,msForm:{label:"",date:""}});
};
window.toggleDetect=function(){setState({showDetect:!state.showDetect,detected:null,pasteText:""});};
window.setPasteText=function(val){setState({pasteText:val});};
window.addDetected=function(i){
  const item=state.detected[i];
  state.tasks=[...state.tasks,{...item,id:Date.now()+Math.random(),status:"To Do"}];
  state.detected=state.detected.filter((_,j)=>j!==i);
  setAndSave({});
};
window.addAllDetected=function(){
  const n=Date.now();
  state.tasks=[...state.tasks,...state.detected.map((x,i)=>({...x,id:n+i,status:"To Do"}))];
  setAndSave({detected:[]});
};
window.runDetect=async function(){
  if(!state.pasteText.trim())return;
  setState({detecting:true,detected:null,detectError:""});
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`You are a task extractor for FLEX, an AI fitness app startup in Malaysia. Extract all actionable tasks from the conversation below. Return ONLY a raw JSON array, no markdown:\n[{"title":"...","cat":"IT|Finance|Legal|Marketing|Operations","priority":"High|Medium|Low","notes":"..."}]\nIf nothing actionable, return [].\n\nConversation:\n${state.pasteText}`}]})});
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==="text")?.text||"[]";
    setState({detected:JSON.parse(raw.replace(/```json|```/g,"").trim()),detecting:false});
  }catch(e){setState({detectError:"Couldn't detect tasks. Try again.",detecting:false});}
};

function chip(label,s){return `<span style="font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;background:${s.bg};color:${s.color};border:1px solid ${s.border||"#eee"}">${label}</span>`;}
function inp(val,onchange,ph=""){return `<input value="${(val||"").replace(/"/g,"&quot;")}" oninput="${onchange}" placeholder="${ph}" style="padding:8px 12px;border-radius:10px;border:1.5px solid ${C.border};background:#FDFCFF;color:${C.text};font-size:13px;width:100%;outline:none"/>`;}
function sel(val,onchange,opts){return `<select onchange="${onchange}" style="padding:7px 10px;border-radius:10px;border:1.5px solid ${C.border};background:#FDFCFF;color:${C.text};font-size:12px;outline:none;width:100%">${opts.map(o=>`<option value="${o.v||o}" ${(val===o.v||val===o)?"selected":""}>${o.l||o}</option>`).join("")}</select>`;}

function render(){
  const s=state;
  if(s.loading){document.getElementById("app").innerHTML=`<div style="text-align:center;padding:3rem;color:${C.muted}"><i class="ti ti-loader-2 spin" style="font-size:32px"></i><div style="margin-top:12px;font-size:14px">Loading your tasks…</div></div>`;return;}

  const visibleCat=s.activeTab==="All"?null:s.activeTab;
  const filtered=s.tasks.filter(t=>(!visibleCat||t.cat===visibleCat)&&(s.filterStatus==="All"||t.status===s.filterStatus));
  const doneCnt=s.tasks.filter(t=>t.status==="Done").length;
  const pct=s.tasks.length?Math.round(doneCnt/s.tasks.length*100):0;
  const nextMs=s.milestones.filter(m=>!m.done).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const nextDays=nextMs?daysUntil(nextMs.date):null;

  // Modal
  let modalHTML="";
  if(s.modal&&s.draft){
    const d=s.draft;
    modalHTML=`
    <div style="position:fixed;inset:0;background:rgba(109,40,217,0.15);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)closeModal()">
      <div style="background:#fff;border-radius:20px;width:100%;max-width:400px;border:1px solid ${C.border};box-shadow:0 24px 64px rgba(124,58,237,0.18);overflow:hidden">
        <div style="background:linear-gradient(135deg,#F5F3FF,#FDF2F8);padding:16px 20px;border-bottom:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:14px;font-weight:500;color:${C.accent}">${s.modal.mode==="add"?"New task":"Edit task"}</span>
          <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:${C.muted}"><i class="ti ti-x"></i></button>
        </div>
        <div style="padding:16px 20px;display:flex;flex-direction:column;gap:11px">
          <div><div style="font-size:10px;color:${C.accent};font-weight:500;margin-bottom:4px;letter-spacing:.07em">TITLE</div>${inp(d.title,"setDraft('title',this.value)","What needs to be done?")}</div>
          <div><div style="font-size:10px;color:${C.accent};font-weight:500;margin-bottom:4px;letter-spacing:.07em">CATEGORY</div>${sel(d.cat,"setDraft('cat',this.value)",CATEGORIES.map(c=>({v:c.id,l:c.label})))}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><div style="font-size:10px;color:${C.accent};font-weight:500;margin-bottom:4px;letter-spacing:.07em">PRIORITY</div>${sel(d.priority,"setDraft('priority',this.value)",PRIORITIES)}</div>
            <div><div style="font-size:10px;color:${C.accent};font-weight:500;margin-bottom:4px;letter-spacing:.07em">STATUS</div>${sel(d.status,"setDraft('status',this.value)",STATUSES)}</div>
          </div>
          <div><div style="font-size:10px;color:${C.accent};font-weight:500;margin-bottom:4px;letter-spacing:.07em">NOTES</div>${inp(d.notes,"setDraft('notes',this.value)","Add a note…")}</div>
          <div style="display:flex;gap:8px;justify-content:space-between;margin-top:4px">
            <div style="display:flex;gap:8px">
              <button onclick="saveTask()" style="padding:8px 18px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:linear-gradient(135deg,${C.accent},${C.pink});color:#fff">Save</button>
              <button onclick="closeModal()" style="padding:8px 18px;border-radius:12px;border:1px solid ${C.border};cursor:pointer;font-size:13px;background:#F5F3FF;color:${C.sub}">Cancel</button>
            </div>
            ${s.modal.mode==="view"?`<button onclick="deleteTask(${s.modal.task.id})" style="padding:8px 14px;border-radius:12px;background:#FFF1F2;color:#BE123C;border:1px solid #FECDD3;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px"><i class="ti ti-trash"></i> Delete</button>`:""}
          </div>
        </div>
      </div>
    </div>`;
  }

  // Milestones
  const msHTML=s.milestones.map((m,i)=>{
    const d=daysUntil(m.date);
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:${i<s.milestones.length-1?`1px dashed ${C.border}`:"none"}">
      <span onclick="toggleMs(${m.id})" style="cursor:pointer;font-size:16px;color:${m.done?C.accent:"#DDD6FE"}"><i class="ti ${m.done?"ti-circle-check-filled":"ti-circle-dashed"}"></i></span>
      <span style="font-size:11px;color:${C.muted};min-width:88px">${fmtDate(m.date)}</span>
      <span style="font-size:12px;color:${m.done?C.muted:C.text};text-decoration:${m.done?"line-through":"none"};flex:1">${m.label}</span>
      ${!m.done?`<span style="font-size:11px;font-weight:500;color:${d<0?"#BE123C":d<=7?"#92400E":C.muted}">${d<0?Math.abs(d)+"d late":d===0?"today":d+"d"}</span>`:""}
      <span onclick="deleteMs(${m.id})" style="cursor:pointer;color:${C.border};font-size:13px"><i class="ti ti-x"></i></span>
    </div>`;
  }).join("");

  // Task list
  const taskListHTML=(visibleCat?CATEGORIES.filter(c=>c.id===visibleCat):CATEGORIES).map(cat=>{
    const catTasks=filtered.filter(t=>t.cat===cat.id);
    if(!catTasks.length)return "";
    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div style="width:22px;height:22px;border-radius:6px;background:${cat.bg};border:1px solid ${cat.border};display:flex;align-items:center;justify-content:center"><i class="ti ${cat.icon}" style="font-size:12px;color:${cat.color}"></i></div>
        <span style="font-size:12px;font-weight:500;color:${cat.color}">${cat.label}</span>
        <span style="font-size:10px;color:${cat.color};background:${cat.bg};border-radius:10px;padding:1px 7px;border:1px solid ${cat.border}">${catTasks.length}</span>
      </div>
      ${catTasks.map(t=>`
        <div class="task-card" onclick="openView(${t.id})" style="background:#fff;border:1px solid ${C.border};border-radius:12px;padding:11px 14px;cursor:pointer;opacity:${t.status==="Done"?0.55:1};margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:10px">
            <span onclick="event.stopPropagation();cycleStatus(${t.id})" style="font-size:17px;color:${t.status==="Done"?C.accent:t.status==="In Progress"?"#8B5CF6":"#DDD6FE"}"><i class="ti ${t.status==="Done"?"ti-circle-check-filled":t.status==="In Progress"?"ti-circle-half-2":"ti-circle"}"></i></span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500;color:${C.text};text-decoration:${t.status==="Done"?"line-through":"none"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div>
              <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center">
                <span style="display:flex;align-items:center;gap:3px;font-size:10px;color:${PRI[t.priority].color};background:${PRI[t.priority].bg};padding:1px 7px;border-radius:10px;font-weight:500"><span style="width:5px;height:5px;border-radius:50%;background:${PRI[t.priority].dot};display:inline-block"></span>${t.priority}</span>
                ${chip(t.status,STA[t.status])}
                ${t.notes?`<span style="font-size:10px;color:${C.muted}">· ${t.notes}</span>`:""}
              </div>
            </div>
            <i class="ti ti-chevron-right" style="font-size:13px;color:${C.border}"></i>
          </div>
        </div>`).join("")}
    </div>`;
  }).join("");

  // Detect panel
  const detectHTML=s.showDetect?`
  <div style="background:#fff;border:1px solid #DDD6FE;border-radius:16px;padding:16px;margin-bottom:18px">
    <div style="font-size:13px;font-weight:500;color:${C.accent};margin-bottom:3px"><i class="ti ti-sparkles"></i> Paste conversation to detect tasks</div>
    <div style="font-size:11px;color:${C.muted};margin-bottom:8px">Copy any chat and paste below — AI will extract actionable tasks.</div>
    <textarea oninput="setPasteText(this.value)" placeholder="Paste your conversation here…" rows="4" style="padding:8px 12px;border-radius:10px;border:1.5px solid ${C.border};background:#FDFCFF;color:${C.text};font-size:13px;width:100%;outline:none;resize:vertical;line-height:1.6;font-family:inherit">${s.pasteText}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="runDetect()" ${s.detecting||!s.pasteText.trim()?"disabled":""} style="padding:7px 16px;border-radius:12px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:${s.detecting?"#EDE9FE":`linear-gradient(135deg,${C.accent},${C.pink})`};color:${s.detecting?C.muted:"#fff"};display:flex;align-items:center;gap:6px;opacity:${!s.pasteText.trim()?0.5:1}">
        ${s.detecting?`<i class="ti ti-loader-2 spin"></i> Detecting…`:`<i class="ti ti-search"></i> Detect tasks`}
      </button>
      <button onclick="toggleDetect()" style="padding:7px 12px;border-radius:12px;background:#F5F3FF;color:${C.sub};border:1px solid ${C.border};cursor:pointer;font-size:12px">Close</button>
    </div>
    ${s.detectError?`<div style="font-size:12px;color:#BE123C;margin-top:8px">${s.detectError}</div>`:""}
    ${s.detected?s.detected.length===0?`<div style="font-size:12px;color:${C.muted};text-align:center;padding:10px 0">No actionable tasks found.</div>`:`
    <div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;color:${C.accent};font-weight:500">${s.detected.length} task${s.detected.length>1?"s":""} detected</div>
        ${s.detected.length>1?`<button onclick="addAllDetected()" style="padding:4px 12px;border-radius:10px;background:#EDE9FE;color:${C.accent};border:1px solid #DDD6FE;cursor:pointer;font-size:11px">Add all</button>`:""}
      </div>
      ${s.detected.map((item,i)=>{const cat=CATEGORIES.find(c=>c.id===item.cat)||CATEGORIES[0];return`
      <div style="background:#FDFCFF;border:1px solid ${C.border};border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:${C.text};margin-bottom:3px">${item.title}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span style="font-size:10px;color:${cat.color};background:${cat.bg};padding:1px 7px;border-radius:10px;border:1px solid ${cat.border}">${cat.label}</span>
            <span style="font-size:10px;color:${PRI[item.priority]?.color};background:${PRI[item.priority]?.bg};padding:1px 7px;border-radius:10px">${item.priority}</span>
            ${item.notes?`<span style="font-size:10px;color:${C.muted}">· ${item.notes}</span>`:""}
          </div>
        </div>
        <button onclick="addDetected(${i})" style="padding:5px 12px;border-radius:10px;background:#EDE9FE;color:${C.accent};border:1px solid #DDD6FE;cursor:pointer;font-size:11px;white-space:nowrap"><i class="ti ti-plus"></i> Add</button>
      </div>`;}).join("")}
    </div>`:""}
  </div>`:"";

  document.getElementById("app").innerHTML=`
  ${modalHTML}
  <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:${C.text};background:${C.bg};border-radius:20px;padding:1.5rem">

    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px;gap:12px">
      <div style="flex:1">
        <div style="font-size:20px;font-weight:500;background:linear-gradient(135deg,${C.accent},${C.pink});-webkit-background-clip:text;-webkit-text-fill-color:transparent">FLEX Tasks</div>
        <div style="font-size:12px;color:${C.muted};margin-top:1px">${doneCnt}/${s.tasks.length} done · ${pct}%</div>
        <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">
          <button onclick="toggleDetect()" style="padding:6px 12px;border-radius:12px;border:1px solid ${C.border};background:${s.showDetect?"#EDE9FE":"#fff"};color:${C.accent};cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px"><i class="ti ti-sparkles"></i> AI detect</button>
          <button onclick="openAdd()" style="padding:6px 14px;border-radius:12px;border:none;background:linear-gradient(135deg,${C.accent},${C.pink});color:#fff;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;box-shadow:0 4px 12px rgba(124,58,237,0.25)"><i class="ti ti-plus"></i> Add task</button>
        </div>
      </div>
      ${pompomHTML()}
    </div>

    <div style="height:5px;background:#EDE9FE;border-radius:10px;margin-bottom:18px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${C.accent},#EC4899);border-radius:10px;transition:width .4s"></div>
    </div>

    ${detectHTML}

    <div style="background:#fff;border:1px solid ${C.border};border-radius:16px;padding:12px 16px;margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:10px;font-weight:500;color:${C.muted};letter-spacing:.08em;text-transform:uppercase">Milestones</div>
        <button onclick="toggleMsForm()" style="font-size:11px;background:#F5F3FF;border:1px solid ${C.border};border-radius:8px;padding:3px 10px;cursor:pointer;color:${C.accent};display:flex;align-items:center;gap:3px"><i class="ti ti-plus" style="font-size:11px"></i> Add</button>
      </div>
      ${nextMs?`<div style="background:${nextDays<=3?"#FFF1F2":nextDays<=7?"#FFFBEB":"#F5F3FF"};border:1px solid ${nextDays<=3?"#FECDD3":nextDays<=7?"#FCD34D":"#DDD6FE"};border-radius:10px;padding:7px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <i class="ti ti-clock" style="font-size:14px;color:${nextDays<=3?"#BE123C":nextDays<=7?"#92400E":C.accent}"></i>
        <span style="font-size:12px;color:${nextDays<=3?"#BE123C":nextDays<=7?"#92400E":C.accent};font-weight:500">${nextDays<0?Math.abs(nextDays)+"d overdue":nextDays===0?"Today!!":nextDays+" days to go"}<span style="font-weight:400;color:${C.muted}"> — ${nextMs.label}</span></span>
      </div>`:""}
      ${s.showMsForm?`<div style="background:#FDFCFF;border:1px solid #DDD6FE;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px">
        <input oninput="setMsForm('label',this.value)" placeholder="Milestone name" value="${s.msForm.label}" style="padding:8px 12px;border-radius:10px;border:1.5px solid ${C.border};background:#fff;color:${C.text};font-size:13px;width:100%;outline:none"/>
        <input type="date" oninput="setMsForm('date',this.value)" value="${s.msForm.date}" style="padding:8px 12px;border-radius:10px;border:1.5px solid ${C.border};background:#fff;color:${C.text};font-size:13px;width:100%;outline:none"/>
        <div style="display:flex;gap:6px">
          <button onclick="addMs()" style="padding:6px 16px;border-radius:10px;background:linear-gradient(135deg,${C.accent},${C.pink});color:#fff;border:none;cursor:pointer;font-size:12px">Save</button>
          <button onclick="toggleMsForm()" style="padding:6px 12px;border-radius:10px;background:#F5F3FF;color:${C.sub};border:1px solid ${C.border};cursor:pointer;font-size:12px">Cancel</button>
        </div>
      </div>`:""}
      ${msHTML}
    </div>

    <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px">
      ${["All",...CATEGORIES.map(c=>c.id)].map(tab=>{
        const cat=CATEGORIES.find(c=>c.id===tab);
        const active=s.activeTab===tab;
        const cnt=tab==="All"?s.tasks.length:s.tasks.filter(t=>t.cat===tab).length;
        return`<button onclick="setTab('${tab}')" style="padding:5px 13px;border-radius:20px;border:1px solid ${active?"transparent":C.border};background:${active?(cat?cat.bg:`linear-gradient(135deg,${C.accent},${C.pink})`):"#fff"};color:${active?(cat?cat.color:"#fff"):C.muted};cursor:pointer;font-size:11px;font-weight:${active?500:400};white-space:nowrap;display:flex;align-items:center;gap:4px;box-shadow:${active?"0 2px 8px rgba(124,58,237,0.12)":"none"}">
          ${cat?`<i class="ti ${cat.icon}" style="font-size:11px"></i>`:""}
          ${tab==="All"?"All":cat?.label}
          <span style="font-size:10px;opacity:0.6;background:rgba(0,0,0,0.05);border-radius:10px;padding:0 5px">${cnt}</span>
        </button>`;
      }).join("")}
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
      <select onchange="setFilter(this.value)" style="padding:7px 10px;border-radius:10px;border:1.5px solid ${C.border};background:#FDFCFF;color:${C.text};font-size:12px;outline:none">
        <option value="All" ${s.filterStatus==="All"?"selected":""}>All statuses</option>
        ${STATUSES.map(st=>`<option value="${st}" ${s.filterStatus===st?"selected":""}>${st}</option>`).join("")}
      </select>
      <span style="font-size:11px;color:${C.muted}">${filtered.length} tasks</span>
    </div>

    ${taskListHTML||`<div style="text-align:center;padding:2rem;color:${C.muted};font-size:13px"><i class="ti ti-clipboard-x" style="font-size:26px;display:block;margin-bottom:8px"></i>Nothing here — add a task!</div>`}

    <div style="font-size:10px;color:${C.muted};text-align:center;margin-top:14px">Tap task to edit · Tap circle to cycle status · Click Pompom to say hi</div>
  </div>`;
}

// Init
loadFromFirebase();
schedulePompom();
</script>
</body>
</html>
